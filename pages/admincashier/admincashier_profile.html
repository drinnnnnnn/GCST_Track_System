﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>GCST Admin Cashier - My Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/admincashier.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Enhanced Activity Section Styling */
    .activity-section {
      background: var(--surface);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(226, 232, 240, 0.8);
      margin-bottom: 24px;
    }

    .activity-section h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .activity-section h2 i {
      color: var(--primary);
      font-size: 1.1rem;
    }

    .profile-header-card {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 32px;
      background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
      border-radius: 24px;
      color: white;
      margin-bottom: 32px;
      box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.2);
    }

    .avatar-placeholder {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.2);
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
    }

    .profile-header-info h2 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 800;
    }

    .profile-header-info p {
      margin: 4px 0 0;
      opacity: 0.9;
      font-weight: 500;
    }

    .btn-action {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: var(--surface-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--surface);
      border-color: var(--primary);
    }
    
    .tab-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 14px 20px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s ease;
    }
    
    .tab-btn:hover {
      color: var(--primary);
    }
    
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: var(--primary-soft);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      background: var(--surface-soft);
      color: var(--text);
      transition: all 0.2s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    
    .save-button {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .save-button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .info-item {
      background: var(--surface-soft);
      border-radius: var(--radius);
      padding: 14px;
    }
    
    .info-item-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    
    .info-item-value {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 600;
    }
    
    .activity-log-item {
      background: var(--surface-soft);
      border-radius: var(--radius);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .activity-log-item:hover {
      background: var(--surface);
      border-color: var(--border);
      transform: translateX(4px);
    }

    .activity-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background-color: var(--success);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      min-width: 80px;
    }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.complete { background: #d1fae5; color: #065f46; }
    .status-badge.failed { background: #fee2e2; color: #991b1b; }
    
    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .profile-actions {
        flex-direction: column;
      }
      
      .btn-action {
        width: 100%;
      }
      
      .tab-buttons {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <!-- Sidebar Component -->
  <div id="sidebar-container"></div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="content-wrapper">

<main>
    <!-- Greeting Section -->
    <section class="greeting-section">
      <div class="greeting-content">
        <h1>My Profile</h1>
        <p>Manage your account and personal information</p>
      </div>
      <div class="greeting-icon">👤</div>
    </section>

    <!-- Tabs -->
    <section style="margin-bottom: 24px;">
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('personal')">Personal Info</button>
        <button class="tab-btn" onclick="switchTab('account')">Account</button>
      </div>
    </section>

    <!-- Tab: Personal Info -->
    <section id="tab-personal" class="tab-content active">
      <div class="activity-section">
        <h2><i class="fas fa-id-card"></i> Personal Information</h2>
        <form id="personal-info-form" onsubmit="saveChanges(event)">
          <div class="form-row">
            <div class="form-group">
              <label for="admin-id">Admin ID</label>
              <input type="text" id="admin-id" placeholder="Admin ID" readonly>
            </div>
            <div class="form-group">
              <label for="full-name">Full Name</label>
              <input type="text" id="full-name" placeholder="Full Name" readonly>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="Email address" readonly>
            </div>
            <div class="form-group">
              <label for="contact-number">Contact Number</label>
              <input type="text" id="contact-number" placeholder="Contact Number" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="signature-image-preview">Signature Image</label>
              <div id="signature-image-preview" style="min-height: 56px; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #f8fafc; overflow: hidden;">
                <span style="color: #64748b; font-size: 0.95rem;">No image uploaded</span>
              </div>
            </div>
            <div class="form-row">
            <div class="form-group" style="width: 100%;">
              <label for="signature-image-upload">Upload Signature Image</label>
              <input type="file" id="signature-image-upload" accept="image/png, image/jpeg" style="width: 100%;" />
              <p style="margin: 6px 0 0; font-size: 0.8rem; color: #64748b;">PNG/JPG only, up to 2MB.</p>
            </div>
          </div>
          
          </div>

          </div>
        </form>
      </div>
    </section>

    <!-- Tab: Account -->
    <section id="tab-account" class="tab-content">
      <div class="activity-section">
        <h2><i class="fas fa-cog"></i> Account Summary</h2>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-item-label">Account Created</div>
            <div class="info-item-value" id="account-created">Loading...</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Last Login</div>
            <div class="info-item-value" id="last-login">Loading...</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Account Status</div>
            <div class="info-item-value" id="account-status" style="color: var(--success);">Active</div>
          </div>
        </div>
      </div>
  </main>

  <!-- Scripts -->
  <script src="../../assets/js/admincashier.js"></script>
  <script>
    window.switchTab = function(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      const activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`);
      if (activeBtn) activeBtn.classList.add('active');
    };

    window.saveChanges = async function(event) {
      event.preventDefault();
      if (!confirm('Are you sure you want to save new information?')) return;

      const fileInput = document.getElementById('signature-image-upload');
      const formData = new FormData();
      formData.append('full_name', document.getElementById('full-name').value.trim());
      formData.append('email', document.getElementById('email').value.trim());
      formData.append('contact_number', document.getElementById('contact-number').value.trim());
      if (fileInput && fileInput.files.length > 0) {
        formData.append('signature_image', fileInput.files[0]);
      }

      try {
        const result = await fetchWithError('../../actions/update_admincashier_profile.php', {
          method: 'POST',
          body: formData
        });

        if (result.success) {
          alert('Profile updated successfully.');
          if (typeof initAdminCashierProfilePage === 'function') {
            initAdminCashierProfilePage();
          }
        } else {
          throw new Error(result.message || 'Unable to update profile.');
        }
      } catch (error) {
        alert(error.message || 'Unable to update profile.');
      }
    };

    window.initAdminCashierProfilePage = async function(userData) {
      try {
        const response = await fetchWithError('../../actions/get_admincashier_profile_data.php');
        const admin = response.admin || {};

        // Populate form fields
        if (document.getElementById('full-name')) document.getElementById('full-name').value = admin.full_name || '';
        if (document.getElementById('email')) document.getElementById('email').value = admin.email || '';
        if (document.getElementById('contact-number')) document.getElementById('contact-number').value = admin.contact_number || '';
        if (document.getElementById('admin-id')) document.getElementById('admin-id').value = admin.admin_id || '';

        if (admin.signature_image) {
          const preview = document.getElementById('signature-image-preview');
          preview.innerHTML = `<img src="${admin.signature_image}" alt="Signature Image" style="max-width: 100%; max-height: 120px; object-fit: contain;" />`;
        }
        
        // Populate account info
        if (document.getElementById('account-created')) {
          document.getElementById('account-created').textContent = admin.created_at ? new Date(admin.created_at).toLocaleString() : 'N/A';
        }
        if (document.getElementById('last-login')) {
          document.getElementById('last-login').textContent = admin.last_login ? new Date(admin.last_login).toLocaleString() : 'N/A';
        }

      } catch (error) {
        console.error('Profile initialization failed:', error);
      }
    };

    // Initialize the page using the central JS helper
    initializeAdminCashierPage(window.initAdminCashierProfilePage);
  </script>
</body>
</html>
