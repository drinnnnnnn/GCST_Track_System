﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>GCST Admin Cashier - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/admincashier.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <!-- Sidebar Component -->
  <div id="sidebar-container"></div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="content-wrapper">

<main>
    <!-- Greeting Section -->
    <section class="greeting-section">
      <div class="greeting-content">
        <h1 id="greeting-message">Welcome back!</h1>
        <p id="current-date-time">Loading...</p>
      </div>
      <div class="greeting-icon">📚</div>
    </section>

    <!-- Summary Section -->
    <section class="balance-section">
      <h2>Dashboard Summary</h2>
      <div class="balance-cards">
        <div class="balance-card">
          <h3>Items in Inventory</h3>
          <p class="amount" id="totalInventory">0</p>
        </div> 
        <div class="balance-card">
          <h3>Pending Queue</h3>
          <p class="amount" id="pendingQueue">0</p>
        </div>
        <div class="balance-card">
          <h3>Total Sales (Today)</h3>
          <p class="amount">  <span id="totalSalesToday"></span></p>
        </div>
      </div>
    </section>

    <!-- Charts Section -->
    <section class="activity-section">
      <h2>Analytics</h2>
      <div class="charts-grid">
        <div class="chart-container">
          <h3>Sales Overview</h3>
          <div class="chart-wrapper">
            <canvas id="salesChart"></canvas>
          </div>
        </div>
        <div class="chart-container">
          <h3>Inventory Distribution</h3>
          <div class="chart-wrapper">
            <canvas id="inventoryChart"></canvas>
          </div>
        </div>
        <div class="chart-container">
          <h3>Top Selling Products (Chart)</h3>
          <div class="chart-wrapper">
            <canvas id="topProductsChart"></canvas>
          </div>
        </div>
        <div class="chart-container">
          <div class="flex justify-between items-center mb-6">
            <h3 class="!mb-0 font-bold text-gray-800">Top Selling Products</h3>
            <span class="px-2.5 py-1 rounded-md bg-blue-50 text-blue-600 text-[10px] font-bold uppercase tracking-wider border border-blue-100">Monthly</span>
          </div>
          <div class="top-selling-list-wrapper" style="max-height: 320px; overflow-y: auto;">
            <div id="topSellingContainer" class="space-y-4 pr-3">
              <div class="flex flex-col items-center justify-center py-12 text-gray-400">
                <i class="fas fa-circle-notch fa-spin text-2xl mb-3"></i>
                <p class="text-sm">Fetching sales data...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  </div> <!-- End .content-wrapper -->

  <!-- Scripts -->
  <script src="../../assets/js/admincashier.js"></script>
  <script>
    // Initialize the dashboard page using the central JS helper
    initializeAdminCashierPage(window.initAdminCashierDashboardPage);

    /**
     * Fetches real-time dashboard statistics and updates the UI elements.
     * This ensures the Total Sales Report and other summary metrics stay current.
     */
    async function updateDashboardMetrics() {
      try {
        const response = await fetch('../../actions/get_dashboard_stats.php');
        const result = await response.json();
        
        if (result.success) {
          const { total_sales_today, total_inventory, pending_queue } = result.metrics;
          
          document.getElementById('totalSalesToday').textContent = total_sales_today.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          document.getElementById('totalInventory').textContent = total_inventory;
          document.getElementById('pendingQueue').textContent = pending_queue;
        }
      } catch (error) {
        console.error('Error updating dashboard metrics:', error);
      }
    }

    // Perform initial fetch and set interval for real-time updates (every 30 seconds)
    updateDashboardMetrics();
    setInterval(updateDashboardMetrics, 30000);
  </script>
</body>
</html>
