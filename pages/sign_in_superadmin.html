﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Sign In</title>
    <!-- Premium Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --success: #166534;
            --success-bg: #dcfce7;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #c9d6ff, #e2e2e2, #aec0ff, #f0f2f5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.4s ease;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 14px;
            color: var(--white);
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
        }

        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .login-card p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 500;
        }
        
        .input-box {
            position: relative;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-box label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
            display: block;
        }

        .input-box input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-box input:focus {
            background: var(--white);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .input-box i.input-icon {
            position: absolute;
            left: 14px;
            top: 36px;
            font-size: 1.2rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-box #toggleBtn {
            position: absolute;
            right: 14px;
            top: 36px;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-box #toggleBtn:hover {
            color: var(--primary);
        }

        .pin-input {
            letter-spacing: 0.8rem;
            text-align: center;
            font-weight: 700;
            padding-left: 14px !important;
        }

        .submit-btn {
            margin-top: 1rem;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        #status-area {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            line-height: 1.5;
        }
        .msg-error { background: var(--error-bg); color: var(--error); border: 1px solid #fecaca; }
        .msg-success { background: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-container">
        <div class="header-icon"><i class='bx bx-shield-quarter'></i></div>
    </div>
    <h1>Super Admin Login</h1>
    <p class="subtitle">Enter your master credentials to authorize access.</p>
    
    <div id="status-area"></div>

    <div class="form-group">
        <form action="http://localhost/GCST_Track_System/actions/process_superadmin.php" method="POST" id="authForm" onsubmit="return validateLogin()">
            <div class="input-box">
                <label for="email">Account Identifier</label>
                <input type="text" name="email" id="email" placeholder="Username or Email" required autocomplete="username">
                <i class='bx bxs-user-pin input-icon'></i>
            </div>

            <div class="input-box">
                <label for="password">Master Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                <i class='bx bxs-lock-open-alt input-icon'></i>
                <i class='bx bx-show' id="toggleBtn"></i>
            </div>

            <div class="input-box">
                <label for="pin">Security PIN (4 Digits)</label>
                <input type="password" name="pin" id="pin" class="pin-input" placeholder="••••" maxlength="4" required pattern="\d{4}" inputmode="numeric" autocomplete="one-time-code">
                <i class='bx bxs-key input-icon'></i>
            </div>

            <div class="btn-group">
                <button type="submit" class="submit-btn" id="loginBtn">
                    Authorize Access
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Password visibility toggle
    const toggleBtn = document.getElementById("toggleBtn");
    const passwordField = document.getElementById("password");

    toggleBtn.addEventListener("click", () => {
        const isPass = passwordField.type === "password";
        passwordField.type = isPass ? "text" : "password";
        toggleBtn.classList.toggle("bx-show");
        toggleBtn.classList.toggle("bx-hide");
    });


    // PIN Input Masking/Validation
    const pinInput = document.getElementById("pin");
    pinInput.addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });

    function validateLogin() {
        const btn = document.getElementById("loginBtn");
        if (pinInput.value.length !== 4) {
            showLocalError("Security PIN must be exactly 4 digits.");
            return false;
        }
        btn.disabled = true;
        btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Authenticating...";
        return true;
    }

    function showLocalError(msg) {
        statusArea.style.display = "block";
        statusArea.className = "msg-error";
        statusArea.innerText = msg;
    }

    // Handle status messages from URL
    const urlParams = new URLSearchParams(window.location.search);
    const statusArea = document.getElementById("status-area"); // Redeclared safely by use in functions

    if (urlParams.has('error') || urlParams.has('success')) {
        statusArea.style.display = "block";
        const err = urlParams.get('error');
        statusArea.className = "msg-error";
        
        if (err === 'invalid') {
            statusArea.innerText = "Authentication failed. Invalid identifier or password.";
        } else if (err === 'invalid_pin') {
            statusArea.innerText = "Access Denied: The security PIN is incorrect.";
        } else if (err === 'locked') {
            statusArea.innerText = "Account Locked: Too many failed attempts.";
        } else if (err === 'missing') {
            statusArea.innerText = "All fields (Identifier, Password, and PIN) are required.";
        } else if (err === 'unauthorized') {
            statusArea.innerText = "Access Forbidden: Account inactive or suspended.";
        } else if (err === 'database') {
            statusArea.innerText = "System Error: Unable to reach authentication server. Try again later.";
        } else if (urlParams.get('success') === '1') {
            statusArea.className = "animate-item msg-success";
            statusArea.innerText = "Profile verified. Please login.";
        }
    }
</script>

</body>
</html>
