<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>GCST Super Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/superadmin.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .chart-container {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .chart-container h3 {
    margin-top: 0;
    color: #333;
  }
  .chart-wrapper {
    position: relative;
    height: 300px;
  }
  .full-width {
    grid-column: 1 / -1;
  }
  @media (max-width: 768px) {
    .charts-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

</head>

<body class="antialiased">
  <!-- Sidebar Component -->
  <div id="sidebar-container"></div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div class="content-wrapper">
  <main class="max-w-7xl mx-auto px-6 py-8">
    <!-- Greeting Section -->
    <section class="greeting-section">
      <div class="greeting-content">
        <h1 id="greeting-message">Welcome, Super Admin!</h1>
        <p id="current-date-time"></p>
      </div>
      <div class="greeting-icon">👋</div>
    </section>

    <!-- Summary Section -->
    <section class="balance-section">
      <h2>Dashboard Summary</h2>
      <div class="balance-cards">
        <div class="balance-card">
          <h3>Total Admin Accounts</h3>
          <p class="amount" id="totalAdminAccounts">0</p>
        </div>
        <div class="balance-card">
          <h3>Active Sessions</h3>
          <p class="amount" id="activeSessions">0</p>
        </div>
        <div class="balance-card">
          <h3>System Uptime</h3>
          <p class="amount" id="systemUptime">0%</p>
        </div>
        <div class="balance-card">
          <h3>Pending Issues</h3>
          <p class="amount" id="pendingIssues">0</p>
        </div>
      </div>
    </section>

    <!-- Charts Section -->
    <section class="activity-section">
      <h2>Analytics</h2>
      <div class="charts-grid">
        <div class="chart-container">
          <h3>Recent Admin Activities</h3>
          <div class="chart-wrapper">
            <canvas id="adminActivitiesChart"></canvas>
          </div>
        </div>
        <div class="chart-container">
          <h3>System Health</h3>
          <div class="chart-wrapper">
            <canvas id="systemHealthChart"></canvas>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="../../assets/js/superadmin.js"></script>
  <script>
    let currentSuperAdminId = null;

    // Initialize greeting and current date/time
    window.addEventListener('DOMContentLoaded', () => {
      fetch('../../actions/get_user.php')
        .then(res => res.json())
        .then(data => {
          if (data.admin_id) {
            currentSuperAdminId = data.admin_id;
            updateGreeting(data.name);
          }
        });

      updateDateTime();
      setInterval(updateDateTime, 60000); // Update time every minute

      // Fetch dashboard data
      fetch('../../actions/get_superadmin_dashboard.php')
        .then(res => res.json())
        .then(data => {
          document.getElementById('totalAdminAccounts').textContent = data.total_admin_accounts ?? 0;
          document.getElementById('activeSessions').textContent = data.active_sessions ?? 0;
          document.getElementById('systemUptime').textContent = data.system_uptime ?? 'N/A';
          document.getElementById('pendingIssues').textContent = data.pending_issues ?? 0;
        })
        .catch(err => console.error('Error fetching dashboard data:', err));

      // Fetch chart data
      fetch('../../actions/get_superadmin_charts.php')
        .then(res => res.json())
        .then(data => {
          // Admin Activities Chart
          const activitiesCtx = document.getElementById('adminActivitiesChart').getContext('2d');
          new Chart(activitiesCtx, {
            type: 'line',
            data: {
              labels: data.activities_labels,
              datasets: [{
                label: 'Admin Activities',
                data: data.activities_data,
                borderColor: '#667eea',
                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                tension: 0.4,
                fill: true
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: true } }
            }
          });

          // System Health Chart
          const healthCtx = document.getElementById('systemHealthChart').getContext('2d');
          new Chart(healthCtx, {
            type: 'doughnut',
            data: {
              labels: data.health_labels,
              datasets: [{
                data: data.health_data,
                backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe']
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: true } }
            }
          });
        })
        .catch(err => console.error('Error fetching chart data:', err));
    });

    function updateGreeting(adminName) {
      const hour = new Date().getHours();
      let greet = "Hello";
      if (hour < 12) greet = "Good Morning";
      else if (hour < 18) greet = "Good Afternoon";
      else greet = "Good Evening";

      document.getElementById('greeting-message').textContent = `${greet}, ${adminName}!`;
    }

    function updateDateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = now.toLocaleDateString('en-US', options);
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('current-date-time').textContent = `${dateStr} • ${timeStr}`;
    }

    // Menu toggle
    document.getElementById('menu-icon').addEventListener('click', (e) => {
      e.preventDefault();
      const menu = document.getElementById('dropdown-menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('dropdown-menu');
      if (!menu.contains(e.target) && !document.getElementById('menu-icon').contains(e.target)) {
        menu.style.display = 'none';
      }
    });
  </script>

</body>
</html>
