﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>GCST User - My Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../assets/css/user.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Refined Activity Section Styling */
    .activity-section {
      background: white;
      border-radius: 2.5rem;
      padding: 2.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
      border: 1px solid #f1f5f9;
      margin-top: 0;
      transition: all 0.3s ease;
    }

    .activity-section:hover {
      box-shadow: 0 25px 35px -5px rgba(0, 0, 0, 0.08);
    }

    .activity-section h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .activity-section h2 i {
      color: var(--primary);
      font-size: 1.25rem;
      background: var(--primary-soft);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: var(--surface-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--surface);
      border-color: var(--primary);
    }
    
    .tab-buttons {
      display: inline-flex;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 1.25rem;
      gap: 6px;
      margin-bottom: 1.5rem;
      border: 1px solid #e2e8f0;
      width: auto;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: none; /* Hide scrollbar for Firefox */
    }

    .tab-buttons::-webkit-scrollbar {
      display: none; /* Hide scrollbar for Chrome, Safari, Opera */
    }
    
    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: transparent;
      color: #64748b;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    
    .tab-btn:hover {
      color: var(--primary);
      background: rgba(37, 99, 235, 0.05);
    }
    
    .tab-btn.active {
      color: var(--primary);
      background: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .tab-btn i {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      background: var(--surface-soft);
      color: var(--text);
      transition: all 0.2s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    
    .save-button {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .save-button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .info-item {
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: var(--radius);
      padding: 20px;
      transition: all 0.2s ease;
    }

    .info-item:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    .info-item-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    
    .info-item-value {
      font-size: 1rem;
      color: var(--text);
      font-weight: 600;
    }
    
    .notification-item {
      background: var(--surface-soft);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .notification-label {
      color: var(--text);
      font-weight: 600;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background-color: var(--success);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      min-width: 80px;
    }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.complete { background: #d1fae5; color: #065f46; }
    .status-badge.failed { background: #fee2e2; color: #991b1b; }
    
    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    @media (max-width: 640px) {
      .activity-section {
        padding: 1.5rem;
        border-radius: 1.5rem;
      }
      .tab-buttons {
        margin-bottom: 1.25rem;
      }
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .tab-buttons {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <!-- Sidebar Component -->
  <div id="sidebar-container"></div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div class="content-wrapper">
  <main>
    <!-- Greeting Section -->
    <section class="greeting-section">
      <div class="greeting-content">
        <h1>Profile</h1>
        <p>Manage your profile information and settings.</p>
      </div>
      <div class="greeting-icon">👤</div>
    </section>

    <!-- Tabs -->
    <section>
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('personal')">
          <i class="fas fa-id-badge"></i> Personal Info
        </button>
        <button class="tab-btn" onclick="switchTab('account')">
          <i class="fas fa-user-shield"></i> Account
        </button>
      </div>
    </section>

    <!-- Tab: Personal Info -->
    <section id="tab-personal" class="tab-content active">
      <div class="activity-section">
        <h2><i class="fas fa-id-card"></i> Personal Information</h2>
        <form onsubmit="saveChanges(event)">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="first-name" placeholder="First name" readonly>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="last-name" placeholder="Last name" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="Email address" readonly>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone" placeholder="Phone number">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Grade Level</label>
              <input type="text" id="grade-level" placeholder="Grade level">
            </div>
            <div class="form-group">
              <label>Student ID</label>
              <input type="text" id="student-id" placeholder="Student ID" readonly>
            </div>
          </div>
          <button type="submit" class="save-button">
            <i class="fas fa-check"></i> Save Changes
          </button>
        </form>
      </div>
    </section>

    <!-- Tab: Account -->
    <section id="tab-account" class="tab-content">
      <div class="activity-section">
        <h2><i class="fas fa-user-shield"></i> Account Settings</h2>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-item-label">Account Created</div>
            <div class="info-item-value" id="account-created">Loading...</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Last Login</div>
            <div class="info-item-value" id="last-login">Loading...</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Account Status</div>
            <div class="info-item-value" id="account-status" style="color: var(--success);">Active</div>
          </div>
        </div>

        <h3 style="margin-top: 28px; margin-bottom: 18px;">Change Password</h3>
        <form onsubmit="changePassword(event)" style="max-width: 500px;">
          <div class="form-group">
            <label>Current Password</label>
            <input id="current-password" type="password" placeholder="Enter current password">
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input id="new-password" type="password" placeholder="Enter new password">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input id="confirm-password" type="password" placeholder="Confirm new password">
          </div>
          <button type="submit" class="save-button">
            <i class="fas fa-lock"></i> Update Password
          </button>
        </form>
      </div>
    </section>
  </main>
  </div>

  <!-- Scripts -->
  <script src="../../assets/js/user.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    async function saveChanges(event) {
      event.preventDefault();
      if (!confirm('Are you sure you want to save new information?')) {
        return;
      }

      const payload = {
        first_name: document.getElementById('first-name').value.trim(),
        last_name: document.getElementById('last-name').value.trim(),
        email: document.getElementById('email').value.trim(),
        contact_number: document.getElementById('phone').value.trim()
      };

      try {
        const result = await fetchWithError('../../actions/update_user_profile.php', { // Now points to the new PHP file
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (result.success) {
          alert('Profile updated successfully.');
        } else {
          throw new Error(result.message || 'Unable to update profile.');
        }
      } catch (error) {
        alert(error.message || 'Unable to update profile.');
      }
    }

    async function changePassword(event) {
      event.preventDefault();

      if (!confirm('Are you sure you want to save new information?')) {
        return;
      }

      const currentPassword = document.getElementById('current-password').value.trim();
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();

      if (!currentPassword || !newPassword || !confirmPassword) {
        alert('Please fill all password fields.');
        return;
      }
      if (newPassword !== confirmPassword) {
        alert('New password and confirmation do not match.');
        return;
      }
      if (newPassword.length < 8) {
        alert('New password must be at least 8 characters long.');
        return;
      }

      try {
        const result = await fetchWithError('../../actions/change_password.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: currentPassword, new_password: newPassword, confirm_password: confirmPassword })
        });

        if (result.success) {
          document.getElementById('current-password').value = '';
          document.getElementById('new-password').value = '';
          document.getElementById('confirm-password').value = '';
          alert('Password changed successfully.');
        } else {
          throw new Error(result.message || 'Unable to change password.');
        }
      } catch (error) {
        alert(error.message || 'Unable to change password.');
      }
    }

    async function saveNotifications() {
      if (!confirm('Are you sure you want to save new information?')) {
        return;
      }

      const payload = {
        email_notifications: document.getElementById('email-notif').checked,
        rental_reminders: document.getElementById('rental-notif').checked,
        payment_reminders: document.getElementById('payment-notif').checked,
        queue_notifications: document.getElementById('queue-notif').checked,
        system_updates: document.getElementById('system-notif').checked,
      };

      try {
        const result = await fetchWithError('../../actions/save_notification_preferences.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!result.success) {
          throw new Error(result.message || 'Unable to save notification preferences.');
        }

        alert('Notification preferences saved successfully.');
      } catch (error) {
        alert(error.message || 'Unable to save notification preferences.');
      }
    }

    initializeAdminCashierPage(async (userData) => {
      try {
        const response = await fetchWithError('../../actions/get_user_full.php');
        const user = response.user || {};

        // Fill form fields
        document.getElementById('first-name').value = user.first_name || '';
        document.getElementById('last-name').value = user.last_name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.contact_number || '';
        document.getElementById('grade-level').value = user.year_section || user.course || '';
        document.getElementById('student-id').value = user.student_id || '';

        // Account info
        document.getElementById('account-created').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A';
        document.getElementById('last-login').textContent = user.last_login ? new Date(user.last_login).toLocaleDateString() : 'N/A';
        document.getElementById('account-status').textContent = user.status ? user.status.charAt(0).toUpperCase() + user.status.slice(1) : 'Active';

        const prefs = user.notification_preferences || {};
        document.getElementById('email-notif').checked = prefs.email_notifications ?? true;
        document.getElementById('rental-notif').checked = prefs.rental_reminders ?? true;
        document.getElementById('payment-notif').checked = prefs.payment_reminders ?? true;
        document.getElementById('queue-notif').checked = prefs.queue_notifications ?? true;
        document.getElementById('system-notif').checked = prefs.system_updates ?? true;

        document.getElementById('history-table').innerHTML = historyHtml || `
          <tr><td colspan="5" style="text-align: center;">No transaction history available</td></tr>
        `;
      } catch (error) {
        console.error('Error fetching user data:', error);
      }
    });
  </script> 
</body>
</html>
