<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin / Cashier Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #c9d6ff, #e2e2e2, #aec0ff, #f0f2f5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Icon Styling */
        .header-icon {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), #764ba2);
            border-radius: 24px;
            color: #ffffff;
            font-size: 42px;
            margin: 0 auto 24px;
            box-shadow: 0 15px 35px var(--primary-glow);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Staggered Content Animation */
        .animate-item {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .login-card h1 { animation-delay: 0.2s; font-size: 1.8rem; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; letter-spacing: -1px; }
        .login-card p { animation-delay: 0.3s; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; }
        .input-box:nth-child(1) { animation-delay: 0.4s; }
        .input-box:nth-child(2) { animation-delay: 0.5s; }
        .submit-btn { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-box label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
            margin-left: 5px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 18px;
            padding-right: 50px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 16px;
            font-size: 0.95rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px var(--primary-glow);
            transform: translateY(-2px);
        }

        .input-box i {
            position: absolute;
            right: 18px;
            bottom: 14px;
            font-size: 1.3rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
            transform-origin: center center;
        }

        .input-box i:hover {
            color: var(--primary);
            transform: scale(1.08) translateY(-1px);
            opacity: 0.95;
        }

        .input-box i:active {
            transform: scale(0.96) translateY(0);
        }

        .tooltip-icon::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -34px;
            right: 0;
            white-space: nowrap;
            background: rgba(15, 23, 42, 0.95);
            color: #fff;
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
            z-index: 2;
            pointer-events: none;
        }

        .tooltip-icon:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .tooltip-btn {
            position: relative;
        }

        .tooltip-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            white-space: nowrap;
            background: rgba(15, 23, 42, 0.95);
            color: #fff;
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
            z-index: 2;
            pointer-events: none;
        }

        .tooltip-btn:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .submit-btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 12px 24px var(--primary-glow);
        }

        /* Status UI */
        #status-area {
            display: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .msg-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .msg-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Shield/Admin Icon Added Here -->
    <div class="header-icon animate-item"><i class='bx bx-shield-quarter'></i></div>

    <h1 class="animate-item">Admin Login</h1>
    <p class="animate-item">Authorized personnel access only</p>

    <div id="status-area" class="animate-item tooltip-btn" role="status"></div>

    <form action="http://localhost/GCST_Track_System/actions/process_admin_cashier.php" method="POST" id="authForm">
        <div class="input-box animate-item tooltip-btn" data-tooltip="(Example: admin@gmail.com or AdminUser)">
            <label>Username or Email</label>
            <input type="text" name="email" placeholder="Username or Email" autocomplete="username" required>
            <i class='bx bxs-envelope'></i>
        </div>

        <div class="input-box animate-item">
            <div style="position: relative;" class="tooltip-btn" data-tooltip="Your account password.">
                <label>Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
                <i class='bx bx-hide tooltip-icon' id="toggleBtn" style="cursor: pointer; position: absolute; right: 10px; top: 38px;" data-tooltip="Show or hide password"></i>
            </div>

            <div style="position: relative; margin-top: 15px;" class="tooltip-btn" data-tooltip="4-digit PIN used for extra security.">
                <label>Pin</label>
                <input type="password" name="pin" id="pin" placeholder="••••" maxlength="4" pattern="\d{4}" inputmode="numeric" required>
                <i class='bx bx-hide tooltip-icon' id="togglePinBtn" style="cursor: pointer; position: absolute; right: 10px; top: 38px;" data-tooltip="Show or hide PIN"></i>
            </div>
        </div>

        <button type="submit" class="submit-btn animate-item" id="loginBtn">
            Sign In
        </button>
    </form>
</div>

<script>
    // Visibility toggle helper
    const setupVisibilityToggle = (buttonId, fieldId) => {
        const button = document.getElementById(buttonId);
        const field = document.getElementById(fieldId);
        if (!button || !field) return;

        button.addEventListener("click", () => {
            const isHidden = field.type === "password";
            field.type = isHidden ? "text" : "password";
            button.classList.toggle("bx-show", !isHidden);
            button.classList.toggle("bx-hide", isHidden);
        });
    };

    setupVisibilityToggle("toggleBtn", "password");
    setupVisibilityToggle("togglePinBtn", "pin");
    // Handle status messages from URL
    const urlParams = new URLSearchParams(window.location.search);
    const statusArea = document.getElementById("status-area");

    if (urlParams.has('error') || urlParams.has('success')) {
        statusArea.style.display = "block";

        const errorCode = urlParams.get('error');
        const successCode = urlParams.get('success');

        if (errorCode === 'wrongpassword') {
            statusArea.className = "animate-item msg-error";
            statusArea.innerText = "Invalid Password.";
            statusArea.setAttribute('data-tooltip', 'Please verify your password and try again.');
            alert("Login failed: Invalid Password.");

        } else if (errorCode === 'nouser') {
            statusArea.className = "animate-item msg-error";
            statusArea.innerText = "Authorized account not found.";
            statusArea.setAttribute('data-tooltip', 'Check your username/email and ensure your account exists.');

        } else if (errorCode === 'invalid') {
            statusArea.className = "animate-item msg-error";
            statusArea.innerText = "Invalid credentials. Please check your inputs.";
            statusArea.setAttribute('data-tooltip', 'Make sure username/email, password, and PIN are correct.');

        } else if (errorCode === 'suspended') {
            statusArea.className = "animate-item msg-error";
            statusArea.innerText = "Account suspended.";
            statusArea.setAttribute('data-tooltip', 'Your account is currently suspended. Contact the administrator.');
        } else if (errorCode === 'locked') {
            statusArea.className = "animate-item msg-error";
            statusArea.innerText = "Account suspended after 4 failed login attempts. Contact the administrator.";
            statusArea.setAttribute('data-tooltip', 'Your account is temporarily locked after too many failed attempts.');

        } else if (successCode === '1') {
            statusArea.className = "animate-item msg-success";
            statusArea.innerText = "Profile verified. Please login.";
            statusArea.setAttribute('data-tooltip', 'Verification successful, you may now sign in.');
        }
    }
</script>
</body>
</html>
